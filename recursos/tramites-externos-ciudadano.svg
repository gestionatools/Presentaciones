<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1021 600" role="img" aria-labelledby="title desc">
  <title id="title">Formulario externo Expone / Solicita</title>
  <desc id="desc">Recreación vectorial de un formulario de datos generales de obra con un selector desplegable de tipo de obra.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1f2937" flood-opacity="0.22"/>
    </filter>
    <style>
      .page{fill:#f3f6f8}.ink{fill:#142235}.muted{fill:#243449}.line{stroke:#d9dde3;stroke-width:1}.outer{fill:#fff;stroke:#b7c2d0;stroke-width:1.2}.section{fill:#fff;stroke:#d5d9df;stroke-width:1}.label{font-family:Inter,Arial,sans-serif;font-size:14px;fill:#142235}.small{font-family:Inter,Arial,sans-serif;font-size:12px;fill:#142235}.title{font-family:Inter,Arial,sans-serif;font-size:19px;font-weight:800;fill:#142235}.strong{font-family:Inter,Arial,sans-serif;font-size:14px;font-weight:700;fill:#142235}.input{fill:#edf3fb;stroke:#6d92bd;stroke-width:1.2}.placeholder{font-family:Inter,Arial,sans-serif;font-size:13px;font-style:italic;fill:#4f78a7}.select{fill:#c4f5e8;stroke:#3a7773;stroke-width:2}.option{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#153044}.active{fill:#1769c9}.activeText{font-family:Inter,Arial,sans-serif;font-size:13px;fill:#fff}.dropdown{fill:#c4f5e8;stroke:#356f6c;stroke-width:1.4;filter:url(#shadow)}
    </style>
  </defs>

  <rect class="page" width="1021" height="600"/>
  <text x="25" y="28" class="strong">Expone / Solicita</text>
  <text x="25" y="66" class="strong">Expone</text>

  <rect x="25" y="80" width="955" height="520" class="outer"/>
  <text x="39" y="110" class="title">DATOS GENERALES DE LA OBRA</text>

  <rect x="39" y="123" width="926" height="128" class="section"/>
  <line x1="39" y1="164" x2="965" y2="164" class="line"/>
  <line x1="39" y1="208" x2="965" y2="208" class="line"/>
  <line x1="317" y1="164" x2="317" y2="251" class="line"/>
  <text x="52" y="147" class="strong">DESCRIPCIÓN</text>
  <text x="52" y="190" class="small">Tipo de Obra</text>
  <text x="52" y="234" class="small">Descripción de la obra</text>
  <rect x="331" y="172" width="73" height="28" class="input"/>
  <text x="335" y="191" class="placeholder">Seleccionar</text>
  <rect x="331" y="216" width="72" height="28" class="input"/>

  <rect x="39" y="264" width="926" height="128" class="section"/>
  <line x1="39" y1="305" x2="965" y2="305" class="line"/>
  <line x1="39" y1="349" x2="965" y2="349" class="line"/>
  <line x1="317" y1="305" x2="317" y2="392" class="line"/>
  <text x="52" y="288" class="strong">UBICACIÓN</text>
  <text x="52" y="331" class="small">Dirección de la obra</text>
  <text x="52" y="375" class="small">Referencia catastral</text>
  <rect x="331" y="314" width="73" height="28" class="input"/>
  <rect x="331" y="357" width="72" height="28" class="input"/>
  <text x="334" y="376" class="small">4285</text>

  <rect x="39" y="406" width="926" height="171" class="section"/>
  <line x1="39" y1="447" x2="965" y2="447" class="line"/>
  <line x1="39" y1="491" x2="965" y2="491" class="line"/>
  <line x1="39" y1="535" x2="965" y2="535" class="line"/>
  <line x1="317" y1="447" x2="317" y2="577" class="line"/>
  <text x="52" y="431" class="strong">DURACIÓN Y COSTES</text>
  <text x="52" y="473" class="small">Presupuesto de Ejecución Material</text>
  <text x="52" y="517" class="small">Fecha de Inicio de las obras</text>
  <text x="52" y="560" class="small">Duración estimada de la obra</text>
  <rect x="331" y="454" width="49" height="29" class="input"/>
  <text x="335" y="473" class="placeholder">Escribir</text>
  <rect x="331" y="498" width="73" height="28" class="input"/>
  <text x="335" y="517" class="placeholder">Seleccionar</text>
  <rect x="331" y="541" width="49" height="29" class="input"/>
  <text x="335" y="560" class="placeholder">Escribir</text>
  <text x="384" y="560" class="small">*(en días naturales)</text>

  <rect x="354" y="190" width="530" height="145" rx="2" fill="#fff" filter="url(#shadow)" opacity="0.92"/>
  <g>
    <rect x="358" y="197" width="500" height="40" class="select"/>
    <text x="374" y="223" class="small">Seleccione uno</text>
    <path d="M839 215l7 0-3.5 5z" fill="#2f5960"/>
    <rect x="358" y="238" width="500" height="213" class="dropdown"/>
    <rect x="358" y="238" width="500" height="24" class="active"/>
    <text x="374" y="255" class="activeText">Seleccione uno</text>
    <text x="374" y="278" class="option">Paneles Solares</text>
    <text x="374" y="301" class="option">Piscinas</text>
    <text x="374" y="324" class="option">Toldos</text>
    <text x="374" y="347" class="option">Cerramientos de terrazas</text>
    <text x="374" y="370" class="option">Pistas deportivas</text>
    <text x="374" y="393" class="option">Reformas menores</text>
    <text x="374" y="416" class="option">Demolición de edificaciones</text>
    <text x="374" y="439" class="option">Cerramiento de parcelas</text>
  </g>
</svg>
